name: Refresh content

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  trigger-netlify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build hook
        env:
          HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "NETLIFY_BUILD_HOOK secret is not set."
            exit 1
          fi
          curl --fail --silent --show-error -X POST -d {} "$HOOK_URL"
